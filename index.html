<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прыжки пингвина</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #0d1f3c 0%, #0a2a4a 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 0;
  }
  :root {
    --cell-w: 218px;
    --cell-h: 204px;
    --cell-gap: 20px;
    --penguin-w: 80px;
  }

  .game-wrap {
    padding: 1.5rem;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  @media (max-width: 500px) {
    :root {
      --cell-w: calc((100vw - 3rem - var(--cell-gap)) / 2);
      --cell-h: calc(var(--cell-w) * 0.936);
      --penguin-w: 60px;
    }
  }
  .game-title {
    font-size: 22px;
    font-weight: 600;
    color: #e0f0ff;
    margin-bottom: 4px;
    text-align: center;
  }
  .game-sub {
    font-size: 13px;
    color: #6aaac0;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .status-bar { margin-bottom: 1.5rem; text-align: center; width: 100%; }
  .multiplier {
    font-size: 34px;
    font-weight: 600;
    color: #7dd3fc;
  }
  .tower {
    display: flex;
    gap: var(--cell-gap);
    justify-content: center;
    margin-bottom: 1.5rem;
    position: relative;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .cell-mult {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    font-size: 16px;
    font-weight: 800;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(0,150,255,0.9), 0 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* ICE CELL — exact image size */
  .cell {
    width: var(--cell-w);
    height: var(--cell-h);
    position: relative;
    cursor: default;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

    background-size: 100% 100%;
    background-repeat: no-repeat;
    transition: filter 0.15s, transform 0.12s;
  }
  .cell-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell-label {
    font-size: 14px;
    color: #1a6a9a;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
    pointer-events: none;
  }

  .cell.active { cursor: pointer; }
  .cell.active:hover .cell-bg {
    filter: brightness(1.1);
    transform: scale(1.04) translateY(-3px);
  }
  .cell.active:active .cell-bg {
    transform: scale(0.97) translateY(1px);
  }
  .cell.safe .cell-bg {
    filter: hue-rotate(100deg) saturate(1.3) brightness(1.05);
  }
  .cell.dead .cell-bg {
    filter: hue-rotate(-30deg) saturate(1.5) brightness(0.85);
    animation: shake 0.35s ease;
  }
  .cell.reveal-safe .cell-bg {
    filter: hue-rotate(100deg) saturate(1.1);
  }
  .cell.reveal-dead .cell-bg {
    filter: hue-rotate(-30deg) saturate(1.3) brightness(0.9);
  }
  .cell.passed .cell-bg {
    filter: saturate(0.4) brightness(0.65);
  }
  .cell.inactive .cell-bg {
    filter: saturate(0.4) brightness(0.55);
    opacity: 0.5;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%  { transform: translateX(-6px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(-5px); }
    80%  { transform: translateX(5px); }
  }
  @keyframes cell-sink {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    30%  { transform: translateY(10px) scale(0.95); opacity: 0.8; }
    100% { transform: translateY(60px) scale(0.7); opacity: 0; }
  }
  .cell.sinking .cell-bg {
    animation: cell-sink 0.7s ease-in forwards;
  }

  /* PENGUIN */
  #penguin {
    position: absolute;
    width: var(--penguin-w);
    height: auto;
    pointer-events: none;
    z-index: 100;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    transform-origin: bottom center;
  }
  #penguin.idle {
    animation: idle-bob 2s ease-in-out infinite;
  }
  #penguin.falling {
    animation: fall-anim 0.65s ease-in forwards;
  }
  @keyframes idle-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }
  @keyframes fall-anim {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    35%  { transform: translateY(-18px) rotate(-25deg) scale(0.95); opacity: 1; }
    100% { transform: translateY(90px) rotate(100deg) scale(0.4); opacity: 0; }
  }

  #orca {
    position: absolute;
    width: calc(var(--penguin-w) * 1.1);
    height: auto;
    z-index: 99;
    pointer-events: none;
    display: none;
    transform-origin: bottom center;
  }
  #orca.eating {
    display: block;
    animation: orca-jump 0.9s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }
  @keyframes orca-jump {
    0%   { transform: translateY(120px) scale(0.5) rotate(-10deg); opacity: 0; }
    30%  { transform: translateY(-20px) scale(1.2) rotate(5deg); opacity: 1; }
    55%  { transform: translateY(-40px) scale(1.3) rotate(-3deg); opacity: 1; }
    75%  { transform: translateY(-10px) scale(1.1) rotate(2deg); opacity: 1; }
    100% { transform: translateY(140px) scale(0.6) rotate(0deg); opacity: 0; }
  }
    100% { transform: translate(var(--fx), var(--fy)) rotate(var(--fr)); opacity: 0; }
  }

  .cell-icon { font-size: 22px; }

  .msg {
    min-height: 26px;
    font-size: 14px;
    text-align: center;
    color: #7aaacc;
    margin-bottom: 1rem;
  }
  .msg.win { color: #4cdf8a; font-weight: 600; }
  .msg.lose { color: #ff7777; font-weight: 600; }
  .action-area {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid #2a4a6a;
    background: transparent;
    color: #e0f0ff;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #1a3a5a; }
  .btn-accent { border-color: #7dd3fc; color: #7dd3fc; }
  .btn-accent:hover { background: #0d2a40; }
</style>

<div class="game-wrap">
  <p class="game-title">Прыжки пингвина</p>
  <p class="game-sub">Выбери льдинку — одна безопасна, другая ловушка</p>
  <div class="status-bar">
    <div class="multiplier" id="multiplier">×1.00</div>
  </div>
  <div class="tower" id="tower"></div>
  <div class="msg" id="msg"></div>
  <div class="action-area">
    <button class="btn btn-accent" id="cashout-btn" onclick="cashOut()" style="display:none">Забрать ×<span id="cashout-val">1.00</span></button>
    <button class="btn" onclick="startGame()">Новая игра</button>
  </div>
</div>

<script>
const ROWS = 50;
const MULTIPLIERS = [1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482, 1.1482];
const CUM_MULT = [1.15, 1.32, 1.52, 1.75, 2.01, 2.31, 2.65, 3.04, 3.49, 4.01, 4.6, 5.28, 6.06, 6.96, 7.99, 9.17, 10.53, 12.09, 13.88, 15.94, 18.3, 21.01, 24.12, 27.69, 31.79, 36.5, 41.91, 48.12, 55.25, 63.44, 72.84, 83.63, 96.02, 110.25, 126.59, 145.35, 166.89, 191.62, 220.02, 252.63, 290.07, 333.06, 382.42, 439.09, 504.16, 578.88, 664.67, 763.17, 876.27, 1006.13];
let state = { grid: [], safe: [], playerRow: -1, mult: 1.0, phase: 'idle' };

const penguin = document.getElementById('penguin');

function getRelPos(el) {
  const r = el.getBoundingClientRect();
  return {
    x: r.left + window.scrollX,
    y: r.top  + window.scrollY,
    w: r.width,
    h: r.height,
    bottom: r.bottom + window.scrollY
  };
}

function penguinHalfW() {
  return penguin.offsetWidth / 2;
}

function placePenguinOn(cellEl) {
  penguin.style.display = '';
  const p = getRelPos(cellEl);
  penguin.style.left = (p.x + p.w / 2 - penguinHalfW()) + 'px';
  penguin.style.top  = (p.y + p.h / 2 - penguin.offsetHeight * 0.67) + 'px';
}

function placePenguinStart() {
  penguin.style.display = '';
  const columns = document.querySelectorAll('.column');
  if (!columns.length) return;
  // row 0 = last child (rendered bottom-up)
  const cell0 = columns[0].children[ROWS - 1];
  const cell1 = columns[1].children[ROWS - 1];
  const p0 = getRelPos(cell0);
  const p1 = getRelPos(cell1);
  // center horizontally between both columns
  const cx = (p0.x + p1.x + p1.w) / 2;
  // penguin feet sit on the TOP surface of row-0 cells (same as placePenguinOn)
  penguin.style.left = (cx - penguinHalfW()) + 'px';
  penguin.style.top  = (p0.bottom + 10) + 'px';
}

function animatePenguinTo(cellEl, onDone) {
  penguin.style.display = '';
  const p = getRelPos(cellEl);
  const destX = p.x + p.w / 2 - penguinHalfW();
  const destY = p.y + p.h / 2 - 56;

  const curLeft = parseFloat(penguin.style.left) || destX;
  const curTop  = parseFloat(penguin.style.top)  || destY;

  const dx = destX - curLeft;
  const dy = destY - curTop;
  const arcH = Math.max(80, Math.abs(dy) * 0.6); // arc height

  penguin.classList.remove('jumping', 'falling', 'idle');

  // move penguin to destination immediately (invisible during animation)
  penguin.style.left = destX + 'px';
  penguin.style.top  = destY + 'px';

  const anim = penguin.animate([
    { transform: `translate(${-dx}px, ${-dy}px) rotate(0deg) scaleX(1)`,            offset: 0    },
    { transform: `translate(${-dx*0.7}px, ${-dy*0.3 - arcH}px) rotate(-12deg) scaleX(0.88)`, offset: 0.3  },
    { transform: `translate(${-dx*0.4}px, ${-dy*0.1 - arcH*1.1}px) rotate(5deg) scaleX(1.05)`, offset: 0.55 },
    { transform: `translate(${-dx*0.15}px, ${dy*0.7}px) rotate(2deg) scaleX(1.02)`, offset: 0.8  },
    { transform: 'translate(0px, 0px) rotate(0deg) scaleX(1)',                       offset: 1    },
  ], { duration: 480, easing: 'cubic-bezier(0.36, 0.07, 0.19, 0.97)', fill: 'forwards' });

  anim.onfinish = () => {
    anim.cancel();
    penguin.classList.add('idle');
    if (onDone) onDone();
  };
}

function animatePenguinFall(onDone) {
  const orca = document.getElementById('orca');
  // position orca at penguin location
  const pl = parseFloat(penguin.style.left) || 0;
  const pt = parseFloat(penguin.style.top)  || 0;
  orca.style.left = pl + 'px';
  orca.style.top  = pt + 'px';
  // hide penguin immediately
  penguin.style.opacity = '0';

  // play orca animation
  orca.classList.remove('eating');
  void orca.offsetWidth;
  orca.classList.add('eating');

  const finishFall = () => {
    orca.classList.remove('eating');
    orca.style.display = 'none';
    penguin.style.opacity = '1';
    if (onDone) { onDone(); onDone = null; }
  };
  orca.addEventListener('animationend', finishFall, { once: true });
  // fallback in case animationend doesn't fire
  setTimeout(finishFall, 1000);
}

function startGame() {
  state.mult = 1.0;
  state.playerRow = -1;
  state.phase = 'playing';
  buildGrid();
  render();
  document.getElementById('cashout-btn').style.display = 'none';
  setMsg('');
  // double rAF: first frame commits DOM, second frame reads correct getBoundingClientRect
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      penguin.classList.remove('jumping', 'falling', 'idle');
      void penguin.offsetWidth;
      placePenguinStart();
      penguin.classList.add('idle');
    });
  });
}

function buildGrid() {
  state.grid = [];
  state.safe = [];
  for (let r = 0; r < ROWS; r++) {
    state.safe.push(Math.random() < 0.5 ? 0 : 1);
    state.grid.push([false, false]);
  }
}

function getCellEl(row, col) {
  const columns = document.querySelectorAll('.column');
  const domIndex = ROWS - 1 - row;
  return columns[col].children[domIndex];
}

function jump(row, col) {
  if (state.phase !== 'playing') return;
  if (row !== state.playerRow + 1) return;
  state.phase = 'animating';
  state.grid[row][col] = true;
  const isSafe = state.safe[row] === col;
  const cellEl = getCellEl(row, col);

  animatePenguinTo(cellEl, () => {
    if (isSafe) {
      state.playerRow = row;
      state.mult = CUM_MULT[row];
      state.phase = 'playing';
      render();
      penguin.classList.remove('jumping');
      penguin.classList.add('idle');
      if (state.playerRow === ROWS - 1) {
        state.phase = 'won';
        revealAll(); render();
        setMsg('🏆 Пингвин добрался до вершины!', 'win');
        document.getElementById('cashout-btn').style.display = 'none';
        return;
      }
      document.getElementById('cashout-btn').style.display = '';
      document.getElementById('cashout-val').textContent = state.mult.toFixed(2);
      setMsg('Отлично! Прыгай дальше или забирай выигрыш');
    } else {
      // sink the clicked cell
      cellEl.classList.add('sinking');
      animatePenguinFall(() => {
        startGame();
      });
    }
  });
}

function cashOut() {
  if (state.phase !== 'playing' || state.playerRow < 0) return;
  state.phase = 'cashed';
  revealAll(); render();
  setMsg('✅ Забрал ×' + state.mult.toFixed(2) + '!', 'win');
  document.getElementById('cashout-btn').style.display = 'none';
}

function revealAll() {
  for (let r = 0; r < ROWS; r++) { state.grid[r][0] = true; state.grid[r][1] = true; }
}

function setMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (cls ? ' ' + cls : '');
}

function render() {
  document.getElementById('multiplier').textContent = '×' + state.mult.toFixed(2);
  const tower = document.getElementById('tower');
  tower.innerHTML = '';
  const col0 = document.createElement('div'); col0.className = 'column';
  const col1 = document.createElement('div'); col1.className = 'column';
  for (let r = ROWS - 1; r >= 0; r--) {
    col0.appendChild(makeCell(r, 0));
    col1.appendChild(makeCell(r, 1));
  }
  tower.appendChild(col0);
  tower.appendChild(col1);
}

function makeCell(row, col) {
  const div = document.createElement('div');
  div.className = 'cell';

  const bg = document.createElement('div');
  bg.className = 'cell-bg';
  div.appendChild(bg);

  const cnt = document.createElement('div');
  cnt.className = 'cell-content';

  const isPlayerHere = state.playerRow === row;
  const isNext = state.playerRow === row - 1 && state.phase === 'playing';
  const isStart = row === 0 && state.playerRow === -1 && state.phase === 'playing';
  const revealed = state.grid[row][col];
  const isSafe = state.safe[row] === col;

  if (row < state.playerRow) {
    div.classList.add('passed');
    cnt.innerHTML = '';
  } else if (revealed) {
    if (isSafe) {
      // on win: don't reveal unvisited cells
      if (isPlayerHere) {
        div.classList.add('safe');
      } else {
        div.classList.add('passed');
      }
      cnt.innerHTML = '';
    } else {
      div.classList.add('passed');
      cnt.innerHTML = '';
    }
  } else if (state.phase === 'playing') {
    div.classList.add('active');
    if (isNext || isStart) {
      div.onclick = () => jump(row, col);
    }
  } else {
    div.classList.add('inactive');
  }

  div.appendChild(cnt);

  // show multiplier on unvisited cells
  if (row > state.playerRow && !revealed) {
    const multEl = document.createElement('div');
    multEl.className = 'cell-mult';
    multEl.textContent = '×' + CUM_MULT[row].toFixed(2);
    div.appendChild(multEl);
  }

  return div;
}
